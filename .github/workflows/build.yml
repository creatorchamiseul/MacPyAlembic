name: Build Alembic + PyAlembic (macOS FINAL)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          brew update
          brew install cmake imath openexr zlib bzip2

      - name: Set Python Env
        run: |
          echo "PYTHON_EXEC=$(which python3)" >> $GITHUB_ENV
          echo "PYTHON_INCLUDE=$(python3 -c "from sysconfig import get_paths as gp; print(gp()['include'])")" >> $GITHUB_ENV
          echo "PYTHON_ROOT=$(python3 -c "import sys; print(sys.prefix)")" >> $GITHUB_ENV
          echo "PYTHON_LIB=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")" >> $GITHUB_ENV

      - name: Build Boost (Python íŹ¬í•¨)
        run: |
          curl -L https://archives.boost.io/release/1.84.0/source/boost_1_84_0.tar.gz -o boost.tar.gz
          tar -xzf boost.tar.gz
          cd boost_1_84_0

          ./bootstrap.sh --with-libraries=python --with-python=$PYTHON_EXEC
          ./b2 install -j$(sysctl -n hw.ncpu)

      - name: Clone Alembic
        run: |
          git clone https://github.com/alembic/alembic.git
          cd alembic
          git checkout 1.8.5
          git submodule update --init --recursive

      - name: Build Alembic + PyAlembic
        run: |
          mkdir -p alembic/build
          cd alembic/build

          cmake .. \
            -DUSE_PYALEMBIC=ON \
            -DUSE_HDF5=OFF \
            -DUSE_STATIC_BOOST=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DBOOST_ROOT=/usr/local \
            -DPYTHON_EXECUTABLE=$PYTHON_EXEC \
            -DPython3_EXECUTABLE=$PYTHON_EXEC \
            -DPython3_ROOT_DIR=$PYTHON_ROOT \
            -DPYTHON_INCLUDE_DIR=$PYTHON_INCLUDE \
            -DPYTHON_LIBRARY=$PYTHON_LIB \
            -DCMAKE_POLICY_DEFAULT_CMP0042=NEW \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DCMAKE_INSTALL_RPATH="@loader_path"

          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build Wheel
        run: |
          cd alembic/python
          python3 setup.py bdist_wheel

      - name: Collect Artifacts
        run: |
          mkdir -p release_assets
          find alembic -name "*.whl" -exec cp {} release_assets/ \;
          find alembic/build/install -name "*.dylib" -exec cp {} release_assets/ \;

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alembic-macos-final
          path: release_assets/

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
