name: Build Alembic (macOS Stable)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          brew update
          brew install cmake boost imath openexr zlib

      - name: Force Python 3.11 Path (중요)
        run: |
          echo "PYTHON_EXEC=$(which python3)" >> $GITHUB_ENV
          echo "PYTHON_INCLUDE=$(python3 -c "from sysconfig import get_paths as gp; print(gp()['include'])")" >> $GITHUB_ENV
          echo "PYTHON_ROOT=$(python3 -c "import sys; print(sys.prefix)")" >> $GITHUB_ENV
          echo "PYTHON_LIB=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")" >> $GITHUB_ENV

      - name: Clone Alembic
        run: |
          git clone https://github.com/alembic/alembic.git
          cd alembic
          git checkout 1.8.5
          git submodule update --init --recursive

      - name: Build Alembic (PyAlembic OFF)
        run: |
          mkdir -p alembic/build
          cd alembic/build

          cmake .. \
            -DUSE_PYALEMBIC=OFF \
            -DUSE_HDF5=OFF \
            -DUSE_STATIC_BOOST=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DPYTHON_EXECUTABLE=$PYTHON_EXEC \
            -DPython3_EXECUTABLE=$PYTHON_EXEC \
            -DPython3_ROOT_DIR=$PYTHON_ROOT \
            -DPYTHON_INCLUDE_DIR=$PYTHON_INCLUDE \
            -DPYTHON_LIBRARY=$PYTHON_LIB \
            -DCMAKE_POLICY_DEFAULT_CMP0042=NEW \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DCMAKE_INSTALL_RPATH="@loader_path"

          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Collect Artifacts
        run: |
          mkdir -p release_assets
          find alembic/build/install -name "*.dylib" -exec cp {} release_assets/ \;

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alembic-macos
          path: release_assets/

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
