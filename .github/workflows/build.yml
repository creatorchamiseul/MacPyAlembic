name: Build PyAlembic (REAL FIX)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13   # 🔥 중요 (구버전 환경)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: deps
        run: |
          brew install cmake zlib

      - name: env
        run: |
          echo "PY=$(which python3)" >> $GITHUB_ENV

      # 🔥 Boost
      - name: boost
        run: |
          curl -L https://archives.boost.io/release/1.78.0/source/boost_1_78_0.tar.gz -o b.tar.gz
          tar -xzf b.tar.gz
          cd boost_1_78_0
          ./bootstrap.sh --with-libraries=python --with-python=$PY
          ./b2 install --prefix=$GITHUB_WORKSPACE/boost

      # 🔥 OpenEXR + Imath (OLD VERSION 핵심)
      - name: openexr + imath
        run: |
          git clone https://github.com/AcademySoftwareFoundation/openexr.git
          cd openexr
          git checkout v2.5.9   # 🔥 핵심

          mkdir build && cd build
          cmake .. \
            -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/openexr \
            -DPYTHON=$PY \
            -DOPENEXR_BUILD_PYTHON_LIBS=ON

          make -j$(sysctl -n hw.ncpu)
          make install

      # 🔥 Alembic
      - name: alembic
        run: |
          git clone https://github.com/alembic/alembic.git
          cd alembic
          git checkout 1.8.5
          git submodule update --init --recursive

      - name: build pyalembic
        run: |
          mkdir alembic/build
          cd alembic/build

          cmake .. \
            -DUSE_PYALEMBIC=ON \
            -DUSE_HDF5=OFF \
            -DBOOST_ROOT=$GITHUB_WORKSPACE/boost \
            -DALEMBIC_ILMBASE_ROOT=$GITHUB_WORKSPACE/openexr \
            -DPYTHON_EXECUTABLE=$PY

          make -j$(sysctl -n hw.ncpu)

      - name: save
        run: |
          mkdir dist
          cp -r alembic/build dist/out
