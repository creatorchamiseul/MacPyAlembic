
name: Build Alembic + PyAlembic (macOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    permissions: # 릴리스 생성을 위해 필수
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 버전을 명시하는 것이 안정적입니다.

      - name: Install Dependencies
        run: |
          brew install cmake boost imath openexr zlib

      - name: Clone Alembic
        run: |
          git clone https://github.com/alembic/alembic.git
          cd alembic
          git submodule update --init --recursive

      - name: Build Alembic & PyAlembic
        run: |
          mkdir -p alembic/build
          cd alembic/build
          # CMake 실행 시 Python 경로를 명시해 주는 것이 안전합니다.
          cmake .. \
            -DUSE_PYALEMBIC=ON \
            -DUSE_HDF5=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DPYTHON_EXECUTABLE=$(which python3)
          
          make -j$(sysctl -n hw.ncpu)

      - name: Build Wheel
        run: |
          cd alembic/python/PyAlembic
          python3 setup.py bdist_wheel

      - name: Collect Artifacts
        run: |
          mkdir -p release_assets
          find alembic -name "*.whl" -exec cp {} release_assets/ \;
          find alembic/build -name "*.dylib" -exec cp {} release_assets/ \;

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
