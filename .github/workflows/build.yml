name: Build Alembic + PyAlembic (macOS FIXED)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: deps
        run: |
          brew update
          brew install cmake openexr zlib bzip2

      - name: env
        run: |
          echo "PY=$(which python3)" >> $GITHUB_ENV

      - name: boost
        run: |
          curl -L https://archives.boost.io/release/1.84.0/source/boost_1_84_0.tar.gz -o b.tar.gz
          tar -xzf b.tar.gz
          cd boost_1_84_0
          ./bootstrap.sh --with-libraries=python --with-python=$PY
          ./b2 install --prefix=$GITHUB_WORKSPACE/boost -j$(sysctl -n hw.ncpu)

      - name: alembic
        run: |
          git clone https://github.com/alembic/alembic.git
          cd alembic
          git checkout 1.8.5
          git submodule update --init --recursive

      # 🔥 CMP0042 제거
      - name: patch cmake
        run: |
          sed -i '' 's/CMAKE_POLICY(SET CMP0042 OLD)//g' alembic/CMakeLists.txt

      # 🔥 PyImath 완전 제거 (핵심)
      - name: patch pyalembic
        run: |
          sed -i '' 's/Imath::PyImath_Python3_[0-9_]*/Imath::Imath/g' alembic/python/PyAlembic/CMakeLists.txt
          sed -i '' '/PyImath/d' alembic/python/PyAlembic/CMakeLists.txt

      - name: build
        run: |
          mkdir alembic/build
          cd alembic/build

          cmake .. \
            -DUSE_PYALEMBIC=ON \
            -DUSE_HDF5=OFF \
            -DBOOST_ROOT=$GITHUB_WORKSPACE/boost \
            -DPython3_EXECUTABLE=$PY

          make -j$(sysctl -n hw.ncpu)

      - name: save
        run: |
          mkdir dist
          cp -r alembic/build dist/out

      - name: commit
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add dist || true
          git commit -m "build" || true
          git push || true
