name: Build Alembic + PyAlembic (macOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          brew update
          brew install cmake boost imath openexr zlib

      - name: Clone Alembic (Stable Version)
        run: |
          git clone https://github.com/alembic/alembic.git
          cd alembic
          git checkout 1.8.5
          git submodule update --init --recursive

      - name: Build Alembic & PyAlembic
        run: |
          mkdir -p alembic/build
          cd alembic/build

          PYTHON_EXEC=$(which python3)
          PYTHON_INCLUDE=$(python3 -c "from sysconfig import get_paths as gp; print(gp()['include'])")
          PYTHON_LIB=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")

          cmake .. \
            -DUSE_PYALEMBIC=ON \
            -DUSE_HDF5=OFF \
            -DUSE_STATIC_BOOST=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DPYTHON_EXECUTABLE=$PYTHON_EXEC \
            -DPYTHON_INCLUDE_DIR=$PYTHON_INCLUDE \
            -DPYTHON_LIBRARY=$PYTHON_LIB \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DCMAKE_INSTALL_RPATH="@loader_path"

          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build Wheel
        run: |
          cd alembic/python
          python3 setup.py bdist_wheel

      - name: Collect Artifacts
        run: |
          mkdir -p release_assets
          find alembic -name "*.whl" -exec cp {} release_assets/ \;
          find alembic/build/install -name "*.dylib" -exec cp {} release_assets/ \;

      - name: Upload Artifact (Debug용)
        uses: actions/upload-artifact@v4
        with:
          name: alembic-macos-build
          path: release_assets/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
