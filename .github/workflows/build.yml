name: Build Alembic + PyAlembic (macOS -> repo commit)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          brew update
          brew install cmake imath openexr zlib bzip2

      - name: Set Python Env
        run: |
          echo "PYTHON_EXEC=$(which python3)" >> $GITHUB_ENV
          echo "PYTHON_INCLUDE=$(python3 -c "from sysconfig import get_paths as gp; print(gp()['include'])")" >> $GITHUB_ENV
          echo "PYTHON_ROOT=$(python3 -c "import sys; print(sys.prefix)")" >> $GITHUB_ENV
          echo "PYTHON_LIB=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")" >> $GITHUB_ENV

      - name: Build Boost (LOCAL PREFIX)
        run: |
          curl -L https://archives.boost.io/release/1.84.0/source/boost_1_84_0.tar.gz -o boost.tar.gz
          tar -xzf boost.tar.gz
          cd boost_1_84_0

          ./bootstrap.sh --with-libraries=python --with-python=$PYTHON_EXEC
          ./b2 install \
            --prefix=$GITHUB_WORKSPACE/boost \
            -j$(sysctl -n hw.ncpu)

      - name: Clone Alembic
        run: |
          git clone https://github.com/alembic/alembic.git
          cd alembic
          git checkout 1.8.5
          git submodule update --init --recursive

      # 💣 핵심: CMake OLD 정책 제거
      - name: Patch CMake (fix CMP0042)
        run: |
          sed -i '' 's/CMAKE_POLICY(SET CMP0042 OLD)/CMAKE_POLICY(SET CMP0042 NEW)/g' alembic/CMakeLists.txt

      - name: Build Alembic + PyAlembic
        run: |
          mkdir -p alembic/build
          cd alembic/build

          cmake .. \
            -DUSE_PYALEMBIC=ON \
            -DUSE_HDF5=OFF \
            -DUSE_STATIC_BOOST=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DBOOST_ROOT=$GITHUB_WORKSPACE/boost \
            -DBOOST_INCLUDEDIR=$GITHUB_WORKSPACE/boost/include \
            -DBOOST_LIBRARYDIR=$GITHUB_WORKSPACE/boost/lib \
            -DPYTHON_EXECUTABLE=$PYTHON_EXEC \
            -DPython3_EXECUTABLE=$PYTHON_EXEC \
            -DPython3_ROOT_DIR=$PYTHON_ROOT \
            -DPYTHON_INCLUDE_DIR=$PYTHON_INCLUDE \
            -DPYTHON_LIBRARY=$PYTHON_LIB \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DCMAKE_INSTALL_RPATH="@loader_path"

          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build Wheel
        run: |
          cd alembic/python
          python3 setup.py bdist_wheel

      - name: Collect Artifacts
        run: |
          mkdir -p dist/macos
          find alembic -name "*.whl" -exec cp {} dist/macos/ \;
          find alembic/build/install -name "*.dylib" -exec cp {} dist/macos/ \;

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add dist/macos

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Add macOS build artifacts"
            git push
          fi
